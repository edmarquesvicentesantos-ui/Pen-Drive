<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 | PDV Pro 2026</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="pdv-layout">
        <main class="area-cupom">
            <div class="cabecalho-loja">
                <h1>BOTECO 934</h1>
                <p>PETROLINA - PERNAMBUCO</p>
            </div>
            <div class="tabela-venda">
                <table>
                    <thead>
                        <tr>
                            <th>DESCRIÇÃO DO ITEM</th>
                            <th>QTD</th>
                            <th style="text-align:right">TOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-carrinho"></tbody>
                </table>
            </div>
            <div class="painel-total">
                <div style="font-size: 14px; font-weight: bold;">TOTAL A PAGAR</div>
                R$ <span id="total-venda-valor">0,00</span>
            </div>
        </main>

        <aside class="area-comandos">
            <div class="secao">
                <p class="titulo-secao">ATALHOS RÁPIDOS ⚡</p>
                <div class="grade-atalhos">
                    <button class="btn-atalho" onclick="adicionarPorNome('HEINEKEN LATA')">🍺 HEINEKEN</button>
                    <button class="btn-atalho" onclick="adicionarPorNome('DOSE OLD PARR')">🥃 OLD PARR</button>
                    <button class="btn-atalho" onclick="adicionarPorNome('AGUA MINERAL')">💧 ÁGUA</button>
                    <button class="btn-atalho" onclick="adicionarPorNome('COCA COLA')">🥤 COCA</button>
                </div>
            </div>

            <div class="campo-bip">
                <input type="text" id="biparVenda" placeholder="BIPE O CÓDIGO..." autofocus>
            </div>

            <div class="secao">
                <p class="titulo-secao">CLIENTE / MESA</p>
                <input type="text" id="identificacaoCliente" class="input-moderno" placeholder="Quem está pagando?">
            </div>

            <div class="secao">
                <p class="titulo-secao">FORMA DE PAGAMENTO</p>
                <div class="grade-pagamento">
                    <button class="btn-pg ativo" onclick="escolherPag('Pix', this)">PIX</button>
                    <button class="btn-pg" onclick="escolherPag('Dinheiro', this)">DINHEIRO</button>
                    <button class="btn-pg" onclick="escolherPag('Cartão', this)">CARTÃO</button>
                    <button class="btn-pg btn-pendura" onclick="escolherPag('Pendura', this)">PENDURA</button>
                </div>
                <input type="hidden" id="metodoPagamento" value="Pix">
            </div>

            <button class="btn-finalizar" onclick="finalizarVenda()">CONCLUIR VENDA 🍻</button>

            <div class="secao card-reposicao">
                <p class="titulo-secao">REPOSIÇÃO (ESTOQUE BAIXO) 🛒</p>
                <div id="lista-reposicao" class="scroll-especial"></div>
            </div>

            <div class="secao card-penduras">
                <p class="titulo-secao">PENDURAS ATIVAS ⚠️</p>
                <div id="lista-penduras" class="scroll-especial"></div>
            </div>
        </aside>
    </div>

    <div id="modalCadastro" class="modal-overlay">
        <div class="modal-card">
            <h2>CADASTRAR PRODUTO</h2>
            <div class="grade-form">
                <input type="text" id="cadCodigo" placeholder="Bipe o código de barras">
                <input type="text" id="cadNome" placeholder="Nome (Ex: HEINEKEN)">
                <input type="number" step="0.01" id="cadPreco" placeholder="Preço de Venda">
                <input type="number" id="cadEstoque" placeholder="Estoque Atual">
            </div>
            <div class="botoes-modal">
