<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PDV + Boteco934 Music</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding-bottom: 80px; }
        header { background: #1a1a1a; color: #ffcc00; padding: 20px; text-align: center; border-bottom: 4px solid #ffcc00; }
        #player-boteco { position: fixed; bottom: 0; width: 100%; background: #000; color: #fff; padding: 15px; display: flex; justify-content: space-around; align-items: center; border-top: 3px solid #ffcc00; }
        select { background: #222; color: #ffcc00; border: 1px solid #ffcc00; padding: 10px; border-radius: 5px; }
        #btn-play { background: #ffcc00; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header><h1>BOTECO 934 - SISTEMA</h1></header>

<div style="padding: 20px; text-align: center;">
    <h2>Boas vendas! 🍻</h2>
    <p>O som é controlado no rodapé.</p>
</div>

<div id="player-boteco">
    <div id="status">Selecione o som:</div>
    <select id="lista-radios" onchange="tocar(this.value)">
        <option value="">Carregando...</option>
    </select>
    <button id="btn-play" onclick="toggle()">▶ PLAY</button>
</div>

<audio id="player"></audio>

<script>
    const firebaseConfig = { databaseURL: "https://boteco934-music-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const audio = document.getElementById('player');

    // Busca as rádios no seu Firebase
    db.ref('radios').on('value', (snap) => {
        const dados = snap.val();
        const select = document.getElementById('lista-radios');
        select.innerHTML = '<option value="">-- ESCOLHA A RÁDIO --</option>';
        for (let id in dados) {
            let opt = document.createElement('option');
            opt.value = dados[id].url;
            opt.innerHTML = dados[id].nome;
            select.appendChild(opt);
        }
    });

    function tocar(url) {
        if(!url) return;
        audio.src = url;
        audio.play();
        document.getElementById('btn-play').innerText = "⏸ PAUSE";
    }

    function toggle() {
        if (audio.paused) { audio.play(); document.getElementById('btn-play').innerText = "⏸ PAUSE"; }
        else { audio.pause(); document.getElementById('btn-play').innerText = "▶ PLAY"; }
    }
</script>
</body>
</html>
