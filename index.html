<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 | PDV & Mesas</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Boteco 934</h1>
            <div class="caixa-info">
                <span>Caixa: <strong id="total-caixa-dia">R$ 0,00</strong></span>
            </div>
        </header>

        <div id="painel-mesas" class="mesa-grid">
            </div>

        <section class="caixa-venda">
            <div class="linha">
                <input type="text" id="biparVenda" placeholder="Bipar para Mesa/Cliente" autofocus>
            </div>
            <div id="lista-carrinho" class="carrinho-scroll"></div>
            <div class="linha">
                <input type="text" id="identificacaoCliente" placeholder="Mesa ou Nome Cliente">
                <select id="metodoPagamento">
                    <option value="Pix">Pix</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Cartão">Cartão</option>
                    <option value="Pendura">Pendura</option>
                </select>
                <button onclick="finalizarVenda()" id="btn-finalizar">FECHAR CONTA</button>
            </div>
        </section>

        <details>
            <summary>📦 Estoque / Cadastro</summary>
            <section class="caixa-cadastro">
                <div class="linha">
                    <input type="text" id="codigoBarra" placeholder="Código">
                    <input type="text" id="nomeProduto" placeholder="Nome">
                </div>
                <div class="linha">
                    <input type="number" id="custoProduto" placeholder="Custo">
                    <input type="number" id="precoProduto" placeholder="Venda">
                    <button onclick="salvarProduto()">+</button>
                </div>
            </section>
        </details>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
