<aside class="area-comandos">
    <div class="card-comando">
        <p class="titulo-secao">ENTRADA</p>
        <input type="text" id="biparVenda" placeholder="Bipe o código..." autofocus>
    </div>

    <div class="card-comando">
        <p class="titulo-secao">PAGAMENTO</p>
        <select id="metodoPagamento" class="input-moderno">
            <option value="Pix">📱 PIX</option>
            <option value="Dinheiro">💵 DINHEIRO</option>
            <option value="Cartão">💳 CARTÃO</option>
            <option value="Pendura">📝 PENDURA</option>
        </select>
    </div>

    <button class="btn-finalizar" onclick="finalizarVenda()">CONCLUIR VENDA 🍻</button>

    <div class="menu-cortina">
        <button class="btn-cortina-trigger" onclick="toggleCategorias()">
            📖 VER CATÁLOGO COMPLETO <span id="seta-cortina">▼</span>
        </button>
        <div id="lista-categorias" class="cortina-conteudo">
            <div id="vitrine-produtos" class="vitrine-grid">
                </div>
        </div>
    </div>
</aside>
