<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 | PDV e Gestão</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="pdv-layout">
        <main class="area-cupom">
            <div class="cabecalho-loja">
                <h1>BOTECO 934</h1>
                <p>GESTÃO DE VENDAS E LUCRO</p>
            </div>
            <div class="tabela-venda">
                <table>
                    <thead>
                        <tr>
                            <th>FOTO</th>
                            <th>PRODUTO</th>
                            <th>QTD</th>
                            <th style="text-align:right">TOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-carrinho"></tbody>
                </table>
            </div>
            <div class="painel-total">
                <div style="font-size: 12px; font-weight: bold;">TOTAL A PAGAR</div>
                R$ <span id="total-venda-valor">0,00</span>
            </div>
        </main>

        <aside class="area-comandos">
            <p class="titulo-secao">CÓDIGO DE BARRAS</p>
            <input type="text" id="biparVenda" placeholder="Bipe aqui..." autofocus>
            
            <p class="titulo-secao">PAGAMENTO</p>
            <select id="metodoPagamento" class="input-moderno">
                <option value="Pix">PIX</option>
                <option value="Dinheiro">DINHEIRO</option>
                <option value="Cartão">CARTÃO</option>
                <option value="Pendura">PENDURA (FIADO)</option>
            </select>
    <aside class="area-comandos">
    <p class="titulo-secao">CÓDIGO DE BARRAS</p>
    <input type="text" id="biparVenda" placeholder="Bipe aqui..." autofocus>
    
    <p class="titulo-secao">PAGAMENTO</p>
    <select id="metodoPagamento" class="input-moderno">
        <option value="Pix">PIX</option>
        <option value="Dinheiro">DINHEIRO</option>
        <option value="Cartão">CARTÃO</option>
        <option value="Pendura">PENDURA</option>
    </select>

    <button class="btn-finalizar" onclick="finalizarVenda()">CONCLUIR VENDA 🍻</button>

    <div class="menu-cortina">
        <button class="btn-cortina-trigger" onclick="toggleCategorias()">📦 PRODUTOS RÁPIDOS (CATEGORIAS) ▼</button>
        <div id="lista-categorias" class="cortina-conteudo">
            <p class="titulo-secao">BEBIDAS</p>
            <div class="grade-atalhos">
                <button onclick="adicionarPorNome('HEINEKEN LATA')">Heineken</button>
                <button onclick="adicionarPorNome('COCA COLA')">Coca Cola</button>
            </div>
            <p class="titulo-secao">BOTICÁRIO</p>
            <div class="grade-atalhos">
                <button onclick="adicionarPorNome('PERFUME MALBEC')">Malbec</button>
                <button onclick="adicionarPorNome('HIDRATANTE')">Hidratante</button>
            </div>
        </div>
    </div>
</aside>
            <button class="btn-finalizar" onclick="finalizarVenda()">CONCLUIR VENDA 🍻</button>
        </aside>
    </div>

    <button class="btn-config-flutuante" onclick="abrirModal()">⚙️ GESTÃO</button>

    <div id="modalCadastro" class="modal-overlay">
        <div class="modal-card">
            <h2>CADASTRAR PRODUTO</h2>
            <div class="grade-form">
                <input type="text" id="cadCodigo" placeholder="Código de Barras">
                <input type="text" id="cadNome" placeholder="Nome do Produto">
                <input type="text" id="cadFoto" placeholder="Link da Foto">
                
                <p style="font-size:11px; color:var(--verde); margin-bottom:5px;">CALCULADORA DE FARDO</p>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="number" id="calcPrecoCaixa" placeholder="Preço do Fardo" oninput="calcularCusto()">
                    <input type="number" id="calcQtdCaixa" placeholder="Qtd no Fardo" oninput="calcularCusto()">
                </div>
                
                <input type="number" id="cadCustoUn" placeholder="Custo Unitário" readonly style="background:#222">
                <input type="number" id="cadPreco" placeholder="Preço de Venda Unitário">
            </div>
            <button class="btn-salvar-prod" onclick="salvarNovoProduto()">SALVAR NO FIREBASE ✅</button>
            <button class="btn-cancelar-prod" onclick="fecharModal()">CANCELAR</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
