<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 | PDV Profissional</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="pdv-container">
        <section class="venda-ativa">
            <div class="topo-venda">
                <h1>BOTECO 934</h1>
                <div class="display-total">TOTAL R$ <span id="total-venda-valor">0,00</span></div>
            </div>
            
            <div class="input-container">
                <input type="text" id="biparVenda" placeholder="BIPE O CÓDIGO OU DIGITE..." autofocus>
            </div>

            <div class="tabela-container">
                <table id="tabela-pdv">
                    <thead>
                        <tr>
                            <th>QTD</th>
                            <th>PRODUTO</th>
                            <th>UNIT.</th>
                            <th style="text-align:right">SUBTOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-carrinho">
                        </tbody>
                </table>
            </div>
        </section>

        <aside class="controles-pdv">
            <div class="card-pagamento">
                <label>NOME DO CLIENTE / MESA</label>
                <input type="text" id="identificacaoCliente" placeholder="Ex: MESA 05">
                
                <label>FORMA DE PAGAMENTO</label>
                <div class="botoes-pagamento">
                    <button class="btn-pag" onclick="definirPag('Pix')">PIX</button>
                    <button class="btn-pag" onclick="definirPag('Dinheiro')">DINHEIRO</button>
                    <button class="btn-pag" onclick="definirPag('Cartão')">CARTÃO</button>
                    <button class="btn-pag btn-pendura" onclick="definirPag('Pendura')">PENDURA</button>
                </div>
                <input type="hidden" id="metodoPagamento" value="Pix">
            </div>

            <button class="btn-finalizar" onclick="finalizarVenda()">FINALIZAR VENDA (F10)</button>

            <div class="resumo-caixa">
                <h3>CAIXA DO DIA</h3>
                <div class="linha-caixa">Pix: <span id="faturamento-pix">0,00</span></div>
                <div class="linha-caixa">Dinheiro: <span id="faturamento-dinheiro">0,00</span></div>
            </div>

            <div class="acoes-sistema">
                <button onclick="exportarEstoque()">BACKUP</button>
                <label class="btn-xml">XML <input type="file" id="arquivoImportar" style="display:none"></label>
            </div>
        </aside>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
