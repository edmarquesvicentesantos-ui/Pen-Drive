<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 | PDV Pro</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Boteco 934</h1>
            <span id="status-busca">Aguardando código...</span>
        </header>

        <section class="caixa-cadastro">
            <div class="linha">
                <input type="text" id="codigoBarra" placeholder="Bipar Código" autofocus>
                <button onclick="buscarProduto()" style="background: #3498db; width: 50px;"><i class="fas fa-search"></i>🔎</button>
                <input type="text" id="nomeProduto" placeholder="Nome do Produto">
            </div>
            <div class="linha">
                <select id="categoriaProduto">
                    <option value="Bebidas">Bebidas</option>
                    <option value="Petiscos">Petiscos</option>
                    <option value="Boticário">Boticário</option>
                    <option value="Outros">Outros</option>
                </select>
                <input type="text" id="fotoProduto" placeholder="Link da Foto (URL)">
            </div>
            <div class="linha">
                <input type="number" id="custoProduto" placeholder="Custo R$">
                <input type="number" id="precoProduto" placeholder="Venda R$">
                <button onclick="salvarProduto()" style="width: 100px;">SALVAR</button>
            </div>
        </section>

        <div id="grid-produtos" class="grid"></div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
