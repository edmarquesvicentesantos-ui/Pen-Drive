<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 | PDV</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Boteco 934</h1>
            <span class="status">Online 🟢</span>
        </header>

        <section class="caixa-cadastro">
            <div class="linha">
                <input type="text" id="codigoBarra" placeholder="Bipar Código" autofocus>
                <input type="text" id="nomeProduto" placeholder="Nome do Produto">
            </div>
            <div class="linha">
                <input type="number" id="custoProduto" placeholder="Custo R$">
                <input type="number" id="precoProduto" placeholder="Venda R$">
                <button onclick="salvarProduto()">+</button>
            </div>
        </section>

        <h3>Seu Estoque</h3>
        <div id="grid-produtos" class="grid"></div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
