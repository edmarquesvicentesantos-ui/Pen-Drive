<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 | PDV Pro + Rádio</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --verde: #1fcc7d; --bg: #0d0d0d; --card: #1a1a1a; --texto: #ffffff; --amarelo: #ffcc00; }
        body { margin: 0; background: var(--bg); color: var(--texto); font-family: sans-serif; overflow: hidden; }
        .pdv-layout { display: grid; grid-template-columns: 1fr 380px; height: 100vh; padding: 15px; gap: 15px; box-sizing: border-box; }
        
        /* Cupom */
        .area-cupom { background: #fff; color: #333; border-radius: 20px; padding: 20px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .cabecalho-loja { text-align: center; border-bottom: 2px dashed #ddd; margin-bottom: 10px; }
        .cabecalho-loja h1 { margin: 0; font-size: 24px; color: #000; }
        .tabela-venda { flex-grow: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px 5px; border-bottom: 1px solid #f0f0f0; font-weight: 600; font-size: 14px; }
        .img-tabela { width: 40px; height: 40px; object-fit: cover; border-radius: 5px; }
        .painel-total { background: #000; color: var(--verde); padding: 15px; border-radius: 15px; text-align: right; margin-top: 10px; }
        .painel-total span { font-size: 40px; font-weight: 900; }

        /* Comandos e Vitrine */
        .area-comandos { display: flex; flex-direction: column; gap: 10px; height: 100%; overflow: hidden; }
        .card-comando { background: var(--card); padding: 12px; border-radius: 10px; border: 1px solid #333; }
        .titulo-secao { font-size: 10px; font-weight: bold; color: var(--verde); margin-bottom: 5px; text-transform: uppercase; }
        #biparVenda, .input-moderno { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-finalizar { background: var(--verde); color: #000; border: none; padding: 18px; font-weight: bold; font-size: 18px; border-radius: 12px; cursor: pointer; }

        /* Vitrine de Produtos */
        .container-categorias { background: var(--card); border-radius: 10px; padding: 10px; border: 1px solid #333; flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .vitrine-scroll { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; overflow-y: auto; padding-right: 5px; }
        .card-vitrine { background: #111; padding: 8px; border-radius: 8px; border: 1px solid #222; text-align: center; cursor: pointer; transition: 0.2s; }
        .card-vitrine:hover { border-color: var(--verde); }
        .img-vitrine { width: 100%; height: 60px; object-fit: cover; border-radius: 4px; margin-bottom: 5px; }

        /* PLAYER DE RÁDIO INTEGRADO */
        .player-integrado { background: #000; border: 1px solid var(--amarelo); border-radius: 12px; padding: 10px; display: flex; align-items: center; gap: 10px; margin-top: 5px; }
        .player-integrado select { background: #222; color: var(--amarelo); border: 1px solid #444; font-size: 11px; padding: 5px; flex-grow: 1; border-radius: 5px; outline: none; }
        .btn-play-radio { background: var(--amarelo); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-play-radio:active { transform: scale(0.9); }

        /* Modais e Botão Config */
        .btn-config-flutuante { position: fixed; bottom: 20px; left: 20px; background: #000; color: var(--verde); border: 1px solid var(--verde); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

    <div class="pdv-layout">
        <main class="area-cupom">
            <div class="cabecalho-loja">
                <h1>BOTECO 934</h1>
                <p>PETROLINA - PE</p>
            </div>
            <div class="tabela-venda">
                <table>
                    <thead>
                        <tr style="border-bottom: 1px solid #eee">
                            <th align="left">FOTO</th>
                            <th align="left">PRODUTO</th>
                            <th align="center">QTD</th>
                            <th align="right">TOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-carrinho">
                        </tbody>
                </table>
            </div>
            <div class="painel-total">
                <div style="font-size: 12px;">TOTAL A PAGAR</div>
                R$ <span id="total-venda-valor">0,00</span>
            </div>
        </main>

        <aside class="area-comandos">
            <div class="card-comando">
                <p class="titulo-secao">ENTRADA (BARCODE)</p>
                <input type="text" id="biparVenda" placeholder="Bipe aqui..." autofocus>
            </div>

            <div class="card-comando" style="border-color: var(--amarelo);">
                <p class="titulo-secao" style="color: var(--amarelo);">📻 SOM AMBIENTE</p>
                <div class="player-integrado">
                    <select id="select-radio">
                        <option value="">Carregando rádios...</option>
                    </select>
                    <button id="btn-play-radio" class="btn-play-radio">▶</button>
                </div>
                <audio id="audio-player"></audio>
            </div>

            <div class="card-comando">
                <p class="titulo-secao">PAGAMENTO</p>
                <select id="metodoPagamento" class="input-moderno">
                    <option value="Pix">📱 PIX</option>
                    <option value="Dinheiro">💵 DINHEIRO</option>
                    <option value="Cartão">💳 CARTÃO</option>
                </select>
            </div>

            <button class="btn-finalizar" onclick="finalizarVenda()">CONCLUIR VENDA 🍻</button>

            <div class="container-categorias">
                <p class="titulo-secao">PRODUTOS RÁPIDOS</p>
                <div id="vitrine-produtos" class="vitrine-scroll">
                    </div>
            </div>
        </aside>
    </div>

    <button class="btn-config-flutuante">⚙️</button>

    <script>
        const firebaseConfig = {
            databaseURL: "https://boteco934-music-default-rtdb.firebaseio.com",
            projectId: "boteco934-music"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const audioPlayer = document.getElementById('audio-player');
        const btnPlay = document.getElementById('btn-play-radio');
        const selectRadio = document.getElementById('select-radio');

        // Carrega rádios do Firebase
        db.ref('radios').on('value', (snapshot) => {
            const data = snapshot.val();
            selectRadio.innerHTML = '<option value="">-- Escolha o Som --</option>';
            if (data) {
                Object.keys(data).forEach(key => {
                    let opt = document.createElement('option');
                    opt.value = data[key].url;
                    opt.innerHTML = data[key].nome;
                    selectRadio.appendChild(opt);
                });
            }
        });

        // Função para trocar de rádio
        selectRadio.addEventListener('change', function() {
            const url = this.value;
            if (!url) {
                audioPlayer.pause();
                audioPlayer.src = "";
                btnPlay.innerText = "▶";
                return;
            }
            audioPlayer.src = url;
            audioPlayer.load(); // Importante para streaming
            audioPlayer.play().then(() => {
                btnPlay.innerText = "⏸";
            }).catch(e => console.log("Play bloqueado pelo navegador. Clique no botão."));
        });

        // Função do botão Play/Pause
        btnPlay.addEventListener('click', function() {
            if (!audioPlayer.src && selectRadio.value) {
                audioPlayer.src = selectRadio.value;
                audioPlayer.load();
            }

            if (audioPlayer.paused) {
                audioPlayer.play();
                this.innerText = "⏸";
            } else {
                audioPlayer.pause();
                this.innerText = "▶";
            }
        });
    </script>

    <script type="module" src="app.js"></script>
</body>
</html>
