<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 | PDV & Financeiro</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="pdv-layout">
        <main class="area-cupom">
            <div class="cabecalho-loja">
                <h1>BOTECO 934</h1>
                <p>PETROLINA - PE</p>
            </div>
            <div class="tabela-venda">
                <table>
                    <thead>
                        <tr>
                            <th>DESCRIÇÃO</th>
                            <th>QTD</th>
                            <th style="text-align:right">TOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-carrinho"></tbody>
                </table>
            </div>
            <div class="painel-total">
                <div style="font-size: 14px; font-weight: bold;">TOTAL A PAGAR</div>
                R$ <span id="total-venda-valor">0,00</span>
            </div>
        </main>

        <aside class="area-comandos">
            <div class="secao">
                <p class="titulo-secao">ATALHOS ⚡</p>
                <div class="grade-atalhos">
                    <button class="btn-atalho" onclick="adicionarPorNome('HEINEKEN LATA')">🍺 HEINEKEN</button>
                    <button class="btn-atalho" onclick="adicionarPorNome('DOSE OLD PARR')">🥃 OLD PARR</button>
                    <button class="btn-atalho" onclick="adicionarPorNome('AGUA MINERAL')">💧 ÁGUA</button>
                    <button class="btn-atalho" onclick="adicionarPorNome('COCA COLA')">🥤 COCA</button>
                </div>
            </div>

            <div class="campo-bip">
                <input type="text" id="biparVenda" placeholder="BIPE O CÓDIGO..." autofocus>
            </div>

            <div class="secao">
                <p class="titulo-secao">CLIENTE / MESA</p>
                <input type="text" id="identificacaoCliente" class="input-moderno" placeholder="NOME DO CLIENTE..." list="lista-clientes-sugestao">
                <datalist id="lista-clientes-sugestao"></datalist>
            </div>

            <div class="secao">
                <p class="titulo-secao">PAGAMENTO</p>
                <div class="grade-pagamento">
                    <button class="btn-pg ativo" onclick="escolherPag('Pix', this)">PIX</button>
                    <button class="btn-pg" onclick="escolherPag('Dinheiro', this)">DINHEIRO</button>
                    <button class="btn-pg" onclick="escolherPag('Cartão', this)">CARTÃO</button>
                    <button class="btn-pg btn-pendura" onclick="escolherPag('Pendura', this)">PENDURA</button>
                </div>
                <input type="hidden" id="metodoPagamento" value="Pix">
            </div>

            <button class="btn-finalizar" onclick="finalizarVenda()">CONCLUIR VENDA 🍻</button>

            <div class="grade-dados">
                <button class="btn-dados" onclick="exportarEstoque()">📤 BACKUP</button>
                <label class="btn-dados">
                    📥 IMPORTAR
                    <input type="file" id="arquivoImportar" style="display:none" onchange="importarEstoque(event)">
                </label>
            </div>

            <div class="secao card-reposicao">
                <p class="titulo-secao">REPOSIÇÃO 🛒</p>
                <div id="lista-reposicao" class="scroll-especial"></div>
            </div>

            <div class="secao card-penduras">
                <p class="titulo-secao">PENDURAS ⚠️</p>
                <div id="lista-penduras" class="scroll-especial"></div>
            </div>
        </aside>
    </div>

    <!-- MODAL DE GESTÃO (ESTOQUE + FINANCEIRO) -->
    <div id="modalCadastro" class="modal-overlay">
        <div class="modal-card financeiro">
            <div class="abas-gestao">
                <button id="btn-aba-prod" class="aba-btn ativa" onclick="mudarAba('produtos')">PRODUTOS</button>
                <button id="btn-aba-fin" class="aba-btn" onclick="mudarAba('contas')">FINANCEIRO</button>
            </div>

            <div id="aba-produtos" class="aba-conteudo">
                <h2>ESTOQUE</h2>
                <div class="grade-form">
                    <input type="text" id="cadCodigo" placeholder="Código de Barras">
                    <input type="text" id="cadNome" placeholder="Nome do Produto">
                    <input type="number" step="0.01" id="cadPreco" placeholder="Preço Venda">
                    <input type="number" id="cadEstoque" placeholder="Qtd Estoque">
                </div>
                <button class="btn-salvar-prod" onclick="salvarNovoProduto()">CADASTRAR PRODUTO ✅</button>
            </div>

            <div id="aba-contas" class="aba-conteudo" style="display:none">
                <h2>CONTAS A PAGAR / RECEBER</h2>
                <div class="grade-form">
                    <input type="text" id="finDescricao" placeholder="Descrição (Ex: Luz, Ambev)">
                    <input type="number" step="0.01" id="finValor" placeholder="Valor R$">
                    <select id="finTipo" class="input-moderno">
                        <option value="Saída">🔴 DESPESA (A Pagar)</option>
                        <option value="Entrada">🟢 ENTRADA (Extra)</option>
                    </select>
                </div>
                <button class="btn-salvar-prod" style="background: #e67e22" onclick="salvarFinanceiro()">LANÇAR NO CAIXA 💰</button>
                
                <div class="resumo-caixa">
                    <p>Vendas Hoje: <span id="resumo-vendas" style="color: var(--verde)">R$ 0,00</span></p>
                    <p>Despesas Hoje: <span id="resumo-despesas" style="color: var(--vermelho)">R$ 0,00</span></p>
                    <hr style="border: 0; border-top: 1px solid #333; margin: 10px 0;">
                    <p><strong>SALDO FINAL: <span id="resumo-saldo">R$ 0,00</span></strong></p>
                </div>
            </div>

            <div class="botoes-modal">
                <button class="btn-cancelar-prod" onclick="fecharModal()">FECHAR</button>
            </div>
        </div>
    </div>

    <button class="btn-config-flutuante" onclick="abrirModal()">⚙️ GESTÃO</button>

    <script type="module" src="app.js"></script>
    <script>
        window.escolherPag = (metodo, btn) => {
            document.getElementById('metodoPagamento').value = metodo;
            document.querySelectorAll('.btn-pg').forEach(b => b.classList.remove('ativo'));
            btn.classList.add('ativo');
        };
    </script>
</body>
</html>
