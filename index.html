<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 | PDV Balcão</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Boteco 934</h1>
            <div id="caixa-resumo">Total Venda: <span id="total-venda">R$ 0,00</span></div>
        </header>

        <section class="caixa-venda">
            <div class="linha">
                <input type="text" id="biparVenda" placeholder="Bipar Produto para Venda" autofocus>
            </div>
            <div id="lista-carrinho"></div>
            <div class="linha">
                <select id="metodoPagamento">
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Pix">Pix</option>
                    <option value="Cartão">Cartão</option>
                    <option value="Pendura">Pendura (Anotar)</option>
                </select>
                <input type="text" id="identificacaoCliente" placeholder="Nome do Cliente/Mesa">
                <button onclick="finalizarVenda()" id="btn-finalizar">FINALIZAR</button>
            </div>
        </section>

        <details>
            <summary>📦 Cadastrar Novo Produto / Estoque</summary>
            <section class="caixa-cadastro">
                <div class="linha">
                    <input type="text" id="codigoBarra" placeholder="Código">
                    <input type="text" id="nomeProduto" placeholder="Nome">
                </div>
                <div class="linha">
                    <input type="number" id="custoProduto" placeholder="Custo R$">
                    <input type="number" id="precoProduto" placeholder="Venda R$">
                    <button onclick="salvarProduto()">+</button>
                </div>
            </section>
        </details>

        <div id="grid-produtos" class="grid"></div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
