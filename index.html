<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Boteco 934 | Checkout Supermercado</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="monitor-caixa">
        <main class="coluna-cupom">
            <div class="cabecalho-loja">
                <h1>BOTECO 934</h1>
                <p>Petrolina - PE</p>
            </div>
            
            <div class="area-lista">
                <table id="cupom-itens">
                    <thead>
                        <tr>
                            <th>ITEM</th>
                            <th>QTD</th>
                            <th>VL.UNIT</th>
                            <th>TOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-carrinho">
                        </tbody>
                </table>
            </div>

            <div class="totalizador">
                <div class="label-total">TOTAL A PAGAR</div>
                <div class="valor-total">R$ <span id="total-venda-valor">0,00</span></div>
            </div>
        </main>

        <aside class="coluna-comandos">
            <div class="campo-bip">
                <label>CÓDIGO DE BARRAS</label>
                <input type="text" id="biparVenda" placeholder="BIPE AQUI..." autofocus>
            </div>

            <div class="caixa-fechamento">
                <label>CLIENTE/MESA</label>
                <input type="text" id="identificacaoCliente" placeholder="IDENTIFIQUE">
                
                <label>PAGAMENTO</label>
                <div class="botoes-grade">
                    <button class="btn-pg ativo" onclick="selecionarPg('Pix', this)">PIX</button>
                    <button class="btn-pg" onclick="selecionarPg('Dinheiro', this)">DINHEIRO</button>
                    <button class="btn-pg" onclick="selecionarPg('Cartão', this)">CARTÃO</button>
                    <button class="btn-pg btn-vermelho" onclick="selecionarPg('Pendura', this)">PENDURA</button>
                </div>
                <input type="hidden" id="metodoPagamento" value="Pix">
            </div>

            <button class="btn-finalizar" onclick="finalizarVenda()">FINALIZAR VENDA</button>

            <div class="faturamento-dia">
                <div class="fat-item">PIX: <span id="faturamento-pix">0,00</span></div>
                <div class="fat-item">DIN: <span id="faturamento-dinheiro">0,00</span></div>
            </div>

            <div class="utilitarios">
                <button onclick="exportarEstoque()">BACKUP</button>
                <label class="btn-upload">IMPORTAR <input type="file" id="arquivoImportar" style="display:none"></label>
            </div>
        </aside>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
