<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 | PDV Aberto</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container-geral">
        <main class="caixa-principal">
            <header class="topo-pdv">
                <h1>BOTECO 934</h1>
                <div class="display-total">R$ <span id="total-venda-valor">0,00</span></div>
            </header>

            <div class="entrada-bip">
                <input type="text" id="biparVenda" placeholder="PASSE O PRODUTO AQUI..." autofocus>
            </div>

            <div class="lista-itens-pdv">
                <table id="tabela-carrinho">
                    <thead>
                        <tr>
                            <th>QTD</th>
                            <th>PRODUTO</th>
                            <th>UNIT.</th>
                            <th>TOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-carrinho">
                        </tbody>
                </table>
            </div>

            <div class="rodape-venda">
                <input type="text" id="identificacaoCliente" placeholder="NOME DO CLIENTE OU MESA">
                <select id="metodoPagamento">
                    <option value="Pix">Pix</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Cartão">Cartão</option>
                    <option value="Pendura">Pendura</option>
                </select>
                <button class="btn-finalizar" onclick="finalizarVenda()">CONCLUIR VENDA (F10) 🍻</button>
            </div>
        </main>

        <aside class="painel-lateral">
            <div class="card-faturamento">
                <h3>💰 CAIXA DO DIA</h3>
                <div class="grid-caixa">
                    <div class="item-caixa">Pix: <span id="faturamento-pix">0,00</span></div>
                    <div class="item-caixa">Dinheiro: <span id="faturamento-dinheiro">0,00</span></div>
                    <div class="item-caixa">Pendura: <span id="faturamento-pendura">0,00</span></div>
                </div>
            </div>

            <div class="card-estoque-lista">
                <h3>🥃 ESTOQUE DE DOSES</h3>
                <div id="grid-estoque"></div>
            </div>

            <div class="acoes-sistema">
                <button onclick="exportarEstoque()">BACKUP</button>
                <label class="btn-import">
                    IMPORTAR XML
                    <input type="file" id="arquivoImportar" style="display:none">
                </label>
            </div>
        </aside>
    </div>

    <div id="areaConferencia" class="modal-conferencia">
        <div class="modal-conteudo">
            <h2>VERIFICAR PRODUTOS</h2>
            <div id="corpoConferencia"></div>
            <button onclick="confirmarImportacao()" style="background:#1fcc7d">SALVAR TUDO</button>
            <button onclick="cancelarImportacao()" style="background:#ff5e5e">CANCELAR</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
