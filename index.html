<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 | PDV Completo</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Boteco 934</h1>
            <div class="total-topo">Total: <span id="total-venda-valor">R$ 0,00</span></div>
        </header>

        <section class="caixa-venda">
            <input type="text" id="biparVenda" placeholder="BIPAR PRODUTO OU DOSE" autofocus>
            <div id="lista-carrinho"></div>
            
            <div class="controles-venda">
                <input type="text" id="identificacaoCliente" placeholder="Mesa ou Nome do Cliente">
                <select id="metodoPagamento">
                    <option value="Pix">Pix</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Cartão">Cartão</option>
                    <option value="Pendura">Pendura</option>
                </select>
                <button onclick="finalizarVenda()">FINALIZAR E RECIBO 🍻</button>
            </div>
        </section>

        <section class="caixa-relatorio">
            <h3>📊 Resumo Financeiro Hoje</h3>
            <div class="cards-financeiro">
                <div class="mini-card">Pix: <span id="faturamento-pix">R$ 0,00</span></div>
                <div class="mini-card">Dinheiro: <span id="faturamento-dinheiro">R$ 0,00</span></div>
                <div class="mini-card">Cartão: <span id="faturamento-cartao">R$ 0,00</span></div>
                <div class="mini-card pendura">Penduras: <span id="faturamento-pendura">R$ 0,00</span></div>
            </div>

            <h3>📝 Penduras Ativas (Clique para Receber)</h3>
            <ul id="lista-penduras" class="lista-limpa"></ul>

            <h3>🥃 Inventário de Doses e Estoque</h3>
            <div id="grid-estoque" class="grid-estoque"></div>
        </section>
<section class="caixa-relatorio">
    <h3>📥 Importar e Exportar Dados</h3>
    <div style="display: flex; gap: 10px;">
        <button onclick="exportarProdutos()" style="background: #3498db;">BAIXAR LISTA (EXPORTAR)</button>
        <label class="btn-importar">
            CARREGAR XML / LISTA
            <input type="file" id="importarArquivo" style="display:none" onchange="importarProdutos(this)">
        </label>
    </div>
</section>
        <details>
            <summary>📦 Cadastrar Produto/Destilado</summary>
            <div class="caixa-cadastro">
                <input type="text" id="codigoBarra" placeholder="Código de Barras">
                <input type="text" id="nomeProduto" placeholder="Nome do Produto">
                <input type="number" id="custoProduto" placeholder="Custo da Garrafa">
                <input type="number" id="precoProduto" placeholder="Preço da Dose/Unidade">
                <input type="number" id="qtdDoses" placeholder="Doses por Garrafa (Ex: 15)">
                <button onclick="salvarProduto()">SALVAR NO ESTOQUE</button>
            </div>
        </details>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
