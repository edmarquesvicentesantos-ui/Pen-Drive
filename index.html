<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 | PDV</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="pdv-layout">
        <main class="area-cupom">
            <div class="cabecalho-loja">
                <h1>BOTECO 934</h1>
                <p>PETROLINA - PE</p>
            </div>
            <div class="tabela-venda">
                <table>
                    <thead>
                        <tr>
                            <th>FOTO</th>
                            <th>PRODUTO</th>
                            <th style="text-align:center">QTD</th>
                            <th style="text-align:right">TOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-carrinho"></tbody>
                </table>
            </div>
            <div class="painel-total">
                <div style="font-size: 14px; font-weight: bold;">TOTAL A PAGAR</div>
                R$ <span id="total-venda-valor">0,00</span>
            </div>
        </main>

        <aside class="area-comandos">
            <div class="card-comando">
                <p class="titulo-secao">ENTRADA DE PRODUTO</p>
                <input type="text" id="biparVenda" placeholder="Bipe o código..." autofocus>
            </div>

            <div class="card-comando">
                <p class="titulo-secao">FORMA DE PAGAMENTO</p>
                <select id="metodoPagamento" class="input-moderno">
                    <option value="Pix">PIX</option>
                    <option value="Dinheiro">DINHEIRO</option>
                    <option value="Cartão">CARTÃO</option>
                    <option value="Pendura">PENDURA</option>
                </select>
            </div>

            <button class="btn-finalizar" onclick="finalizarVenda()">CONCLUIR VENDA 🍻</button>

            <div class="container-categorias">
                <p class="titulo-secao">CATÁLOGO POR CATEGORIA</p>
                <div class="filtro-abas">
                    <button class="aba-filtro ativa" onclick="filtrar('TUDO', this)">TUDO</button>
                    <button class="aba-filtro" onclick="filtrar('BEBIDAS', this)">BAR</button>
                    <button class="aba-filtro" onclick="filtrar('BOTICARIO', this)">BOTICÁRIO</button>
                </div>
                <div id="vitrine-produtos" class="vitrine-scroll"></div>
            </div>
        </aside>
    </div>

    <button class="btn-config-flutuante" onclick="abrirModal()">⚙️</button>

    <div id="modalCadastro" class="modal-overlay">
        <div class="modal-card">
            <h3>NOVO PRODUTO</h3>
            <div class="grade-form">
                <input type="text" id="cadCodigo" placeholder="Código de Barras">
                <input type="text" id="cadNome" placeholder="Nome">
                <input type="text" id="cadFoto" placeholder="Link da Foto">
                <select id="cadCategoria" class="input-moderno" style="margin-bottom:10px">
                    <option value="BEBIDAS">BEBIDAS / BAR</option>
                    <option value="BOTICARIO">BOTICÁRIO</option>
                </select>
                <div style="background:#000; padding:10px; border-radius:8px; border:1px solid #1fcc7d; margin-bottom:10px">
                    <p style="font-size:10px; color:#1fcc7d; margin:0">Custo Fardo</p>
                    <div style="display:flex; gap:5px">
                        <input type="number" id="calcPreco" placeholder="R$" oninput="calcular()">
                        <input type="number" id="calcQtd" placeholder="Qtd" oninput="calcular()">
                    </div>
                </div>
                <input type="number" id="cadCustoUn" placeholder="Custo Un." readonly>
                <input type="number" id="cadPreco" placeholder="Venda Un.">
            </div>
            <button class="btn-salvar-prod" onclick="salvarNovoProduto()">SALVAR</button>
            <button class="btn-cancelar-prod" onclick="fecharModal()">FECHAR</button>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
