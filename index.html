<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boteco 934 | PDV Balcão</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="tela-pdv">
        <section class="area-cliente">
            <div class="cabecalho-cliente">
                <span class="nome-loja">BOTECO 934</span>
                <div class="total-grande">R$ <span id="total-venda-valor">0,00</span></div>
            </div>

            <div class="lista-produtos">
                <table id="tabela-venda">
                    <thead>
                        <tr>
                            <th>QTD</th>
                            <th>ITEM</th>
                            <th>UNIT.</th>
                            <th>TOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-carrinho">
                        </tbody>
                </table>
            </div>

            <div class="barra-bip">
                <input type="text" id="biparVenda" placeholder="PASSE O CÓDIGO DE BARRAS..." autofocus>
            </div>
        </section>

        <aside class="area-controle">
            <div class="card-controle">
                <h3>FECHAMENTO</h3>
                <input type="text" id="identificacaoCliente" placeholder="CLIENTE / MESA">
                <select id="metodoPagamento">
                    <option value="Pix">PIX</option>
                    <option value="Dinheiro">DINHEIRO</option>
                    <option value="Cartão">CARTÃO</option>
                    <option value="Pendura">PENDURA</option>
                </select>
                <button class="btn-finalizar" onclick="finalizarVenda()">FINALIZAR 🍻</button>
            </div>

            <div class="card-resumo">
                <h3>CAIXA HOJE</h3>
                <div class="resumo-linha">Pix: <span id="faturamento-pix">0,00</span></div>
                <div class="resumo-linha">Dinheiro: <span id="faturamento-dinheiro">0,00</span></div>
                <div class="resumo-linha">Pendura: <span id="faturamento-pendura" style="color: #ff5e5e;">0,00</span></div>
            </div>

            <div class="acoes-extras">
                <button onclick="exportarEstoque()">BACKUP</button>
                <label class="btn-import">
                    XML
                    <input type="file" id="arquivoImportar" style="display:none">
                </label>
            </div>
        </aside>
    </div>

    <div id="areaConferencia" class="modal">
        <div class="modal-content">
            <h2>REVISAR IMPORTAÇÃO</h2>
            <div id="corpoConferencia" class="scroll-conferencia"></div>
            <button onclick="confirmarImportacao()" class="btn-confirmar">SALVAR TUDO ✅</button>
            <button onclick="cancelarImportacao()" class="btn-cancelar">DESCARTAR ❌</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
